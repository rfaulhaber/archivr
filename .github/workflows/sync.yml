name: Sync from Codeberg

# Pulls all branches and tags from the Codeberg origin-of-truth and
# pushes them to this GitHub mirror. Uses GH_PAT (not GITHUB_TOKEN)
# so that new tags trigger the build workflow.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Clone from Codeberg
        run: git clone --bare https://codeberg.org/${{ vars.CODEBERG_REPO }}.git repo

      - name: Push mirror to GitHub
        run: |
          cd repo
          git push --mirror https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
