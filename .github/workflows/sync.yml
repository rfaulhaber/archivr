name: Sync from Codeberg

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync from Codeberg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --bare https://codeberg.org/ryf/archivr.git repo
          cd repo
          git push --force --prune \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/rfaulhaber/archivr.git" \
            "refs/heads/*:refs/heads/*" \
            "refs/tags/*:refs/tags/*"
