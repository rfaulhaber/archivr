[package]
name = "archivr"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "main"
path = "main.rs"

[lib]
path = "lib.rs"

[dependencies]
camino = "1.2"
clap = { version = "4.5", features = ["derive"] }
crabrave = "0.1"
directories = "6"
fs-err = { version = "3.2", features = ["tokio"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.49", features = ["full"] }

[workspace.lints.clippy]
await_holding_invalid_type = "deny"
await_holding_lock = "deny"
await_holding_refcell_ref = "deny"
disallowed_types = "deny"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"
