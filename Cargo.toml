[package]
name = "rust-template"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "main"
path = "main.rs"

[lib]
path = "lib.rs"

[dependencies]
clap = { version = "4.5.54", features = ["derive"] }
crabrave = "0.1.0"
directories = "6.0.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
